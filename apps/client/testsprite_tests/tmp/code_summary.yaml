version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React
  - Vite
  - Tailwind CSS
routes:
  - path: /library
    file: src/pages/Library.tsx
    auth_required: false
    description: Library of packs
  - path: /library/create
    file: src/pages/CreatePack.tsx
    auth_required: false
    description: Create a new pack
  - path: /library/:slug
    file: src/pages/PackDetails.tsx
    auth_required: false
    description: Pack details view
  - path: /library/:slug/edit
    file: src/pages/EditPack.tsx
    auth_required: false
    description: Edit an existing pack
  - path: /marketplace
    file: src/pages/Marketplace.tsx
    auth_required: false
    description: Marketplace view
features:
  - name: Library Browser
    description: Browse and create content packs
    files:
      - src/pages/Library.tsx
      - src/pages/CreatePack.tsx
    entry_route: /library
    user_interactions:
      - View list of packs
      - Click "Create Pack" button
      - Fill pack form and submit
    api_calls:
      - method: GET
        endpoint: /packs
      - method: POST
        endpoint: /packs
    auth_required: false
  - name: Pack Editor
    description: Edit and manage assets in a pack
    files:
      - src/pages/EditPack.tsx
      - src/pages/PackDetails.tsx
    entry_route: /library/:slug
    user_interactions:
      - View pack assets
      - Click "Edit" for an asset or pack
      - Save changes
    api_calls:
      - method: GET
        endpoint: /packs/:slug
      - method: PUT
        endpoint: /packs/:slug
    auth_required: false
known_limitations: []
