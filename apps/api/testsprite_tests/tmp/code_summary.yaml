version: '2'
type: backend
tech_stack:
  - TypeScript
  - NestJS
  - TypeORM
  - PostgreSQL
features:
  - name: Pack Management
    description: CRUD operations for content packs
    files:
      - src/rules-engine/infrastructure/adapters/in/rest/packs.controller.ts
    endpoints:
      - method: POST
        path: /packs
        description: Create a new pack
        auth_required: false
      - method: GET
        path: /packs
        description: List all packs
        auth_required: false
      - method: GET
        path: /packs/:slug
        description: Get pack details by slug
        auth_required: false
      - method: PUT
        path: /packs/:slug
        description: Update a pack
        auth_required: false
      - method: PATCH
        path: /packs/:slug/suspend
        description: Suspend a pack
        auth_required: false
      - method: PATCH
        path: /packs/:slug/unsuspend
        description: Unsuspend a pack
        auth_required: false
      - method: DELETE
        path: /packs/:slug
        description: Delete a pack
        auth_required: false
  - name: Asset Management
    description: CRUD operations for assets within packs
    files:
      - src/rules-engine/infrastructure/adapters/in/rest/assets.controller.ts
    endpoints:
      - method: POST
        path: /packs/:packSlug/assets
        description: Create a new asset
        auth_required: false
      - method: GET
        path: /packs/:packSlug/assets
        description: List assets in a pack
        auth_required: false
      - method: GET
        path: /packs/:packSlug/assets/:type/:index
        description: Get asset details
        auth_required: false
      - method: PUT
        path: /packs/:packSlug/assets/:type/:index
        description: Update an asset
        auth_required: false
      - method: DELETE
        path: /packs/:packSlug/assets/:type/:index
        description: Delete an asset
        auth_required: false
  - name: Rules Engine
    description: Rules resolution logic
    files:
      - src/rules-engine/infrastructure/adapters/in/rest/resolution.controller.ts
    endpoints:
      - method: POST
        path: /rules/resolve
        description: Resolve an asset with selections
        auth_required: false
known_limitations: []
