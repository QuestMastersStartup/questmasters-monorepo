name = "questmasters-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "questmasters"
database_id = "56aefb70-953d-49c1-b303-7d0c390ea896"
migrations_dir = "drizzle"

[[r2_buckets]]
binding = "AVATARS_BUCKET"
bucket_name = "questmasters-avatars"

[ai]
binding = "AI"

[vars]
NODE_ENV = "production"
ALLOWED_ORIGINS = "https://questmasters.app,https://questmasters-frontend.pages.dev"
R2_PUBLIC_URL = "https://pub-2a8ff7c2e671492c918d10c21a5a9939.r2.dev"

# Secrets — configurar con: wrangler secret put <NAME>
# JWT_SECRET
# DM_USE_RUNPOD
# RUNPOD_ENDPOINT_ID
# RUNPOD_API_KEY

[env.preview]
name = "questmasters-api-preview"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "questmasters"
database_id = "56aefb70-953d-49c1-b303-7d0c390ea896"
migrations_dir = "drizzle"

[[env.preview.r2_buckets]]
binding = "AVATARS_BUCKET"
bucket_name = "questmasters-avatars"

[env.preview.ai]
binding = "AI"

[env.preview.vars]
NODE_ENV = "development"
ALLOWED_ORIGINS = "http://localhost:3001,http://localhost:3000"
R2_PUBLIC_URL = "https://pub-2a8ff7c2e671492c918d10c21a5a9939.r2.dev"